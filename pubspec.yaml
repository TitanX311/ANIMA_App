name: anima_aero_club
description: ANIMA - The Aero Club App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  
  # Lottie Animations
  lottie: ^3.1.0
  
  # Navigation & UI
  go_router: ^13.2.0
  
  # Animations
  animate_do: ^3.3.4
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  
  # Image Handling
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # Storage (Local)
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Networking (Backend-ready)
  dio: ^5.4.1
  
  # UI Extras
  flutter_svg: ^2.0.10+1
  glassmorphism: ^3.0.0
  fl_chart: ^0.67.0
  
  # Icons & Fonts
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  
  # File Picker
  file_picker: ^6.1.1
  
  # Date
  intl: ^0.19.0
  
  # UUID
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/
    - assets/images/

  fonts:
    - family: BebasNeue
      fonts:
        - asset: assets/fonts/BebasNeue-Regular.ttf
